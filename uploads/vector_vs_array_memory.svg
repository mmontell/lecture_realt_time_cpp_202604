<svg xmlns="http://www.w3.org/2000/svg" width="680" height="620" viewBox="0 0 680 620" role="img" style="background-color:#0B0D12">
  <title>std::array vs std::vector memory layout</title>
  <desc>A cartoon showing that std::array stores its data in-place (on the stack), while std::vector stores a pointer, size, and capacity on the stack with the actual data allocated on the heap.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; }
      .th  { font-size: 14px; font-weight: 500; }
      .ts  { font-size: 12px; font-weight: 400; }
    </style>
  </defs>

  <!-- ── TITLES ── -->
  <text class="th" x="160" y="32" text-anchor="middle" font-size="17" fill="#F5A623">Stack</text>
  <text class="th" x="510" y="32" text-anchor="middle" font-size="17" fill="#4ADE80">Heap</text>

  <!-- ══ STACK FRAME ══ -->
  <rect x="40" y="44" width="240" height="520" rx="8" fill="none" stroke="#F5A623" stroke-width="2.5"/>

  <!-- std::array section label -->
  <text class="ts" x="160" y="66" text-anchor="middle" fill="#F5A623" font-style="italic">std::array&lt;int,4&gt; arr</text>

  <!-- array cell 0 -->
  <rect x="60" y="74" width="200" height="44" rx="4" fill="#FAF3E0" stroke="#D4870E" stroke-width="1"/>
  <text class="ts" x="100" y="100" text-anchor="middle" dominant-baseline="central" fill="#5C3D08" font-size="11">int</text>
  <text class="th" x="200" y="100" text-anchor="middle" dominant-baseline="central" fill="#3B2205">7</text>

  <!-- array cell 1 -->
  <rect x="60" y="118" width="200" height="44" rx="4" fill="#FAF3E0" stroke="#D4870E" stroke-width="1"/>
  <text class="ts" x="100" y="140" text-anchor="middle" dominant-baseline="central" fill="#5C3D08" font-size="11">int</text>
  <text class="th" x="200" y="140" text-anchor="middle" dominant-baseline="central" fill="#3B2205">3</text>

  <!-- array cell 2 -->
  <rect x="60" y="162" width="200" height="44" rx="4" fill="#FAF3E0" stroke="#D4870E" stroke-width="1"/>
  <text class="ts" x="100" y="184" text-anchor="middle" dominant-baseline="central" fill="#5C3D08" font-size="11">int</text>
  <text class="th" x="200" y="184" text-anchor="middle" dominant-baseline="central" fill="#3B2205">9</text>

  <!-- array cell 3 -->
  <rect x="60" y="206" width="200" height="44" rx="4" fill="#FAF3E0" stroke="#D4870E" stroke-width="1"/>
  <text class="ts" x="100" y="228" text-anchor="middle" dominant-baseline="central" fill="#5C3D08" font-size="11">int</text>
  <text class="th" x="200" y="228" text-anchor="middle" dominant-baseline="central" fill="#3B2205">2</text>

  <!-- annotation -->
  <text class="ts" x="160" y="268" text-anchor="middle" fill="#4ADE80" font-size="11" font-style="italic">✓ data lives right here!</text>

  <!-- separator -->
  <line x1="40" y1="284" x2="280" y2="284" stroke="#F5A623" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- std::vector section label -->
  <text class="ts" x="160" y="306" text-anchor="middle" fill="#F5A623" font-style="italic">std::vector&lt;int&gt; vec</text>

  <!-- ptr cell -->
  <rect x="60" y="314" width="200" height="44" rx="4" fill="#FDE8E8" stroke="#C0392B" stroke-width="1"/>
  <text class="ts" x="100" y="336" text-anchor="middle" dominant-baseline="central" fill="#6B0D0D" font-size="11">ptr</text>
  <text class="ts" x="195" y="336" text-anchor="end" dominant-baseline="central" fill="#6B0D0D" font-size="11" font-style="italic">→ heap</text>

  <!-- size cell -->
  <rect x="60" y="358" width="200" height="44" rx="4" fill="#FDE8E8" stroke="#C0392B" stroke-width="1"/>
  <text class="ts" x="100" y="380" text-anchor="middle" dominant-baseline="central" fill="#6B0D0D" font-size="11">size</text>
  <text class="th" x="200" y="380" text-anchor="middle" dominant-baseline="central" fill="#3B0808">4</text>

  <!-- capacity cell -->
  <rect x="60" y="402" width="200" height="44" rx="4" fill="#FDE8E8" stroke="#C0392B" stroke-width="1"/>
  <text class="ts" x="100" y="424" text-anchor="middle" dominant-baseline="central" fill="#6B0D0D" font-size="11">capacity</text>
  <text class="th" x="200" y="424" text-anchor="middle" dominant-baseline="central" fill="#3B0808">8</text>

  <!-- annotation -->
  <text class="ts" x="160" y="462" text-anchor="middle" fill="#F87171" font-size="11" font-style="italic">only metadata here</text>

  <!-- faint hatch lines for unused stack space -->
  <line x1="40" y1="480" x2="280" y2="480" stroke="#F5A623" stroke-width="1" stroke-dasharray="4 3" opacity="0.25"/>
  <line x1="40" y1="510" x2="280" y2="510" stroke="#F5A623" stroke-width="1" stroke-dasharray="4 3" opacity="0.15"/>
  <line x1="40" y1="540" x2="280" y2="540" stroke="#F5A623" stroke-width="1" stroke-dasharray="4 3" opacity="0.08"/>

  <!-- ══ HEAP FRAME ══ -->
  <rect x="390" y="44" width="250" height="520" rx="8" fill="none" stroke="#4ADE80" stroke-width="2.5"/>

  <!-- top hatched empty heap rows -->
  <line x1="390" y1="44" x2="640" y2="100" stroke="#F87171" stroke-width="1" opacity="0.18"/>
  <line x1="390" y1="100" x2="640" y2="145" stroke="#F87171" stroke-width="1" opacity="0.18"/>
  <line x1="390" y1="100" x2="640" y2="100" stroke="#4ADE80" stroke-width="0.8" stroke-dasharray="5 4" opacity="0.25"/>
  <line x1="390" y1="145" x2="640" y2="145" stroke="#4ADE80" stroke-width="0.8" stroke-dasharray="5 4" opacity="0.2"/>

  <!-- heap allocation label -->
  <text class="ts" x="515" y="166" text-anchor="middle" fill="#F87171" font-size="11" font-style="italic">vec's heap block</text>

  <!-- heap cell 0 -->
  <rect x="410" y="174" width="210" height="44" rx="4" fill="#FDE8E8" stroke="#C0392B" stroke-width="1"/>
  <text class="ts" x="460" y="196" text-anchor="middle" dominant-baseline="central" fill="#6B0D0D" font-size="11">int</text>
  <text class="th" x="560" y="196" text-anchor="middle" dominant-baseline="central" fill="#3B0808">5</text>

  <!-- heap cell 1 -->
  <rect x="410" y="218" width="210" height="44" rx="4" fill="#FDE8E8" stroke="#C0392B" stroke-width="1"/>
  <text class="ts" x="460" y="240" text-anchor="middle" dominant-baseline="central" fill="#6B0D0D" font-size="11">int</text>
  <text class="th" x="560" y="240" text-anchor="middle" dominant-baseline="central" fill="#3B0808">1</text>

  <!-- heap cell 2 -->
  <rect x="410" y="262" width="210" height="44" rx="4" fill="#FDE8E8" stroke="#C0392B" stroke-width="1"/>
  <text class="ts" x="460" y="284" text-anchor="middle" dominant-baseline="central" fill="#6B0D0D" font-size="11">int</text>
  <text class="th" x="560" y="284" text-anchor="middle" dominant-baseline="central" fill="#3B0808">4</text>

  <!-- heap cell 3 -->
  <rect x="410" y="306" width="210" height="44" rx="4" fill="#FDE8E8" stroke="#C0392B" stroke-width="1"/>
  <text class="ts" x="460" y="328" text-anchor="middle" dominant-baseline="central" fill="#6B0D0D" font-size="11">int</text>
  <text class="th" x="560" y="328" text-anchor="middle" dominant-baseline="central" fill="#3B0808">6</text>

  <!-- reserved cells (dashed, lighter) -->
  <rect x="410" y="350" width="210" height="44" rx="4" fill="#F0FDF4" stroke="#4ADE80" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="410" y1="350" x2="620" y2="394" stroke="#4ADE80" stroke-width="0.8" opacity="0.3"/>
  <text class="ts" x="515" y="372" text-anchor="middle" dominant-baseline="central" fill="#166534" font-size="10" opacity="0.85">reserved</text>

  <rect x="410" y="394" width="210" height="44" rx="4" fill="#F0FDF4" stroke="#4ADE80" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="410" y1="394" x2="620" y2="438" stroke="#4ADE80" stroke-width="0.8" opacity="0.3"/>
  <text class="ts" x="515" y="416" text-anchor="middle" dominant-baseline="central" fill="#166534" font-size="10" opacity="0.85">reserved</text>

  <rect x="410" y="438" width="210" height="44" rx="4" fill="#F0FDF4" stroke="#4ADE80" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="410" y1="438" x2="620" y2="482" stroke="#4ADE80" stroke-width="0.8" opacity="0.3"/>
  <text class="ts" x="515" y="460" text-anchor="middle" dominant-baseline="central" fill="#166534" font-size="10" opacity="0.85">reserved</text>

  <rect x="410" y="482" width="210" height="44" rx="4" fill="#F0FDF4" stroke="#4ADE80" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="410" y1="482" x2="620" y2="526" stroke="#4ADE80" stroke-width="0.8" opacity="0.3"/>
  <text class="ts" x="515" y="504" text-anchor="middle" dominant-baseline="central" fill="#166534" font-size="10" opacity="0.85">reserved</text>

  <!-- cap=8 brace -->
  <line x1="626" y1="174" x2="636" y2="174" stroke="#F87171" stroke-width="1"/>
  <line x1="636" y1="174" x2="636" y2="526" stroke="#F87171" stroke-width="1"/>
  <line x1="626" y1="526" x2="636" y2="526" stroke="#F87171" stroke-width="1"/>
  <text class="ts" x="644" y="354" text-anchor="start" fill="#F87171" font-size="10">cap=8</text>

  <!-- size=4 brace -->
  <line x1="622" y1="174" x2="628" y2="174" stroke="#FCA5A5" stroke-width="0.8"/>
  <line x1="628" y1="174" x2="628" y2="350" stroke="#FCA5A5" stroke-width="0.8"/>
  <line x1="622" y1="350" x2="628" y2="350" stroke="#FCA5A5" stroke-width="0.8"/>
  <text class="ts" x="630" y="265" text-anchor="start" fill="#FCA5A5" font-size="10">size=4</text>

  <!-- ══ POINTER ARROW ══ -->
  <path d="M 260 336 C 330 336, 340 196, 408 196"
        fill="none" stroke="#60A5FA" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ══ CAPTION ══ -->
  <text class="ts" x="340" y="592" text-anchor="middle" fill="#6B7280" font-size="11">std::array: zero indirection · std::vector: one heap allocation + possible realloc</text>
</svg>
