<svg width="1200" height="820" viewBox="0 0 1200 820" xmlns="http://www.w3.org/2000/svg" style="background:#0B0D12;font-family:'Helvetica Neue',Arial,sans-serif;">
<title>AoS vs SoA cache line utilisation — CalorimeterCell</title>
<desc>Side-by-side comparison of Array-of-Structs and Struct-of-Arrays memory layouts, showing how cache lines are filled when only the energy field is accessed in a calorimeter cell collection.</desc>

<rect x="60"  y="22" width="14" height="14" rx="3" fill="#D87A55" stroke="#F0997B" stroke-width="0.5"/>
<text x="82"  y="33" font-size="12" fill="#E8A88A">energy (needed)</text>
<rect x="216" y="22" width="14" height="14" rx="3" fill="#5B9BD5" stroke="#85B7EB" stroke-width="0.5"/>
<text x="238" y="33" font-size="12" fill="#A0C4E8">eta (wasted)</text>
<rect x="330" y="22" width="14" height="14" rx="3" fill="#E8B44A" stroke="#FAC775" stroke-width="0.5"/>
<text x="352" y="33" font-size="12" fill="#E8C87A">phi (wasted)</text>
<rect x="440" y="22" width="14" height="14" rx="3" fill="#4DB88C" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="462" y="33" font-size="12" fill="#7DD4B5">time (wasted)</text>
<rect x="556" y="22" width="14" height="14" rx="3" fill="#1A1D24" stroke="#3A3D44" stroke-width="0.5"/>
<text x="578" y="33" font-size="12" fill="#555860">empty</text>

<defs>
  <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
    <line x1="0" y1="0" x2="0" y2="6" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  </pattern>
</defs>

<text x="600" y="80" text-anchor="middle" font-size="20" font-weight="600" fill="#E0E0E0">Array of Structs (AoS) — intuitive coding</text>

<rect x="120" y="96" width="960" height="60" rx="8" fill="#13161D" stroke="#2A2D35" stroke-width="0.5"/>
<text x="140" y="118" font-family="monospace" font-size="13" fill="#7A8090">struct CalorimeterCell { float eta, phi, time, energy; };  </text>
<text x="690" y="118" font-family="monospace" font-size="13" fill="#555860">// 16 bytes per cell</text>
<text x="140" y="140" font-family="monospace" font-size="13" fill="#7A8090">for (auto&amp; c : cells) total += c.energy;                  </text>
<text x="690" y="140" font-family="monospace" font-size="13" fill="#555860">// only need energy!</text>

<text x="120" y="180" font-size="13" fill="#6A6D75">each cache line (64 bytes) holds 4 complete CalorimeterCell structs — but we only read energy</text>

<text x="60" y="214" text-anchor="end" font-family="monospace" font-size="12" fill="#555860">cache line 1</text>
<rect x="80"  y="196" width="54" height="30" rx="4" fill="#5B9BD5" stroke="#85B7EB" stroke-width="0.5"/>
