<text x="463" y="215" text-anchor="middle" font-family="monospace" font-size="10" fill="#0B0D12">t₁</text>
<rect x="494" y="196" width="54" height="30" rx="4" fill="#D87A55" stroke="#F0997B" stroke-width="1.5"/>
<text x="521" y="215" text-anchor="middle" font-family="monospace" font-size="10" font-weight="600" fill="#0B0D12">E₁</text>
<rect x="560" y="196" width="54" height="30" rx="4" fill="#5B9BD5" stroke="#85B7EB" stroke-width="0.5"/>
