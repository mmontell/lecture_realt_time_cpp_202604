<rect x="80"  y="636" width="280" height="52" rx="8" fill="#13161D" stroke="#2A2D35" stroke-width="0.5"/>
<text x="100" y="658" font-size="22" font-weight="600" fill="#E0E0E0">1</text>
<text x="100" y="676" font-size="11" fill="#6A6D75">cache fetch for 16 energy values</text>
<rect x="380" y="636" width="280" height="52" rx="8" fill="#13161D" stroke="#2A2D35" stroke-width="0.5"/>
<text x="400" y="658" font-size="22" font-weight="600" fill="#4ADE80">100%</text>
<text x="400" y="676" font-size="11" fill="#6A6D75">of fetched bytes used</text>
<rect x="680" y="636" width="350" height="52" rx="8" fill="#13161D" stroke="#2A2D35" stroke-width="0.5"/>
<text x="700" y="658" font-size="22" font-weight="600" fill="#4ADE80">4×</text>
<text x="700" y="676" font-size="11" fill="#6A6D75">more values per fetch vs AoS</text>

<rect x="80" y="704" width="950" height="44" rx="8" fill="#0E2418" stroke="#1B5E30" stroke-width="0.5"/>
<text x="555" y="731" text-anchor="middle" font-size="13" fill="#7DD4A0">The energy[] array is fully packed.  Every byte in every cache line is useful.  eta[], phi[], time[] sit elsewhere — never fetched.</text>

<text x="600" y="784" text-anchor="middle" font-size="13" fill="#7A8090">At N = 10,000 cells:  AoS fetches 160 KB (40 KB useful)  ·  SoA fetches 40 KB (all useful)</text>
<text x="600" y="804" text-anchor="middle" font-size="14" font-weight="600" fill="#E0E0E0">Same data.  Same result.  4× less memory traffic.</text>

</svg>
