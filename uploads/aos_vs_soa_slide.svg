<rect x="858" y="196" width="54" height="30" rx="4" fill="#E8B44A" stroke="#FAC775" stroke-width="0.5"/>
<rect x="858" y="196" width="54" height="30" rx="4" fill="url(#hatch)"/>
<text x="885" y="215" text-anchor="middle" font-family="monospace" font-size="10" fill="#0B0D12">phi₃</text>
<rect x="916" y="196" width="54" height="30" rx="4" fill="#4DB88C" stroke="#5DCAA5" stroke-width="0.5"/>
<rect x="916" y="196" width="54" height="30" rx="4" fill="url(#hatch)"/>
