<rect x="378" y="586" width="54" height="30" rx="4" fill="#D87A55" stroke="#F0997B" stroke-width="1.5"/>
<text x="405" y="605" text-anchor="middle" font-family="monospace" font-size="10" font-weight="600" fill="#0B0D12">E₅</text>
