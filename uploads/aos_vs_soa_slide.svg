<rect x="320" y="236" width="54" height="30" rx="4" fill="url(#hatch)"/>
<text x="347" y="255" text-anchor="middle" font-family="monospace" font-size="10" fill="#0B0D12">eta₅</text>
<rect x="378" y="236" width="54" height="30" rx="4" fill="#E8B44A" stroke="#FAC775" stroke-width="0.5"/>
<rect x="378" y="236" width="54" height="30" rx="4" fill="url(#hatch)"/>
<text x="405" y="255" text-anchor="middle" font-family="monospace" font-size="10" fill="#0B0D12">phi₅</text>
<rect x="436" y="236" width="54" height="30" rx="4" fill="#4DB88C" stroke="#5DCAA5" stroke-width="0.5"/>
<rect x="436" y="236" width="54" height="30" rx="4" fill="url(#hatch)"/>
<text x="463" y="255" text-anchor="middle" font-family="monospace" font-size="10" fill="#0B0D12">t₅</text>
<rect x="494" y="236" width="54" height="30" rx="4" fill="#D87A55" stroke="#F0997B" stroke-width="1.5"/>
<text x="521" y="255" text-anchor="middle" font-family="monospace" font-size="10" font-weight="600" fill="#0B0D12">E₅</text>
<text x="600" y="255" font-family="monospace" font-size="12" fill="#555860">. . .</text>

<rect x="80"  y="288" width="280" height="52" rx="8" fill="#13161D" stroke="#2A2D35" stroke-width="0.5"/>
<text x="100" y="310" font-size="22" font-weight="600" fill="#E0E0E0">3</text>
<text x="100" y="328" font-size="11" fill="#6A6D75">cache fetches for 10 energy values</text>
<rect x="380" y="288" width="280" height="52" rx="8" fill="#13161D" stroke="#2A2D35" stroke-width="0.5"/>
<text x="400" y="310" font-size="22" font-weight="600" fill="#E85D4A">25%</text>
<text x="400" y="328" font-size="11" fill="#6A6D75">of fetched bytes actually used</text>
<rect x="680" y="288" width="350" height="52" rx="8" fill="#13161D" stroke="#2A2D35" stroke-width="0.5"/>
<text x="700" y="310" font-size="22" font-weight="600" fill="#E85D4A">75%</text>
<text x="700" y="328" font-size="11" fill="#6A6D75">bandwidth wasted on eta, phi, time</text>

<rect x="80" y="356" width="950" height="44" rx="8" fill="#2A1418" stroke="#6B2A2A" stroke-width="0.5"/>
<text x="555" y="383" text-anchor="middle" font-size="13" fill="#E8897A">Each fetch loads 4 complete CalorimeterCell structs (64 bytes) but only 16 bytes of energy data are needed.  The other 48 bytes are never read.</text>

<line x1="120" y1="430" x2="1080" y2="430" stroke="#2A2D35" stroke-width="0.5" stroke-dasharray="6 4"/>

<text x="600" y="470" text-anchor="middle" font-size="20" font-weight="600" fill="#E0E0E0">Struct of Arrays (SoA) — performance-optimised</text>

<rect x="120" y="486" width="960" height="60" rx="8" fill="#13161D" stroke="#2A2D35" stroke-width="0.5"/>
<text x="140" y="508" font-family="monospace" font-size="13" fill="#7A8090">struct CalorimeterCells { vector&lt;float&gt; eta, phi, time, energy; };</text>
<text x="720" y="508" font-family="monospace" font-size="13" fill="#555860">// separate arrays</text>
<text x="140" y="530" font-family="monospace" font-size="13" fill="#7A8090">for (int i = 0; i &lt; N; ++i) total += cells.energy[i];            </text>
<text x="720" y="530" font-family="monospace" font-size="13" fill="#555860">// touches only energy[]</text>

<text x="120" y="570" font-size="13" fill="#6A6D75">each cache line holds 16 consecutive energy values — every byte fetched is useful</text>

<text x="60" y="604" text-anchor="end" font-family="monospace" font-size="12" fill="#555860">cache line 1</text>
<rect x="80"  y="586" width="54" height="30" rx="4" fill="#D87A55" stroke="#F0997B" stroke-width="1.5"/>
<text x="107" y="605" text-anchor="middle" font-family="monospace" font-size="10" font-weight="600" fill="#0B0D12">E₀</text>
<rect x="138" y="586" width="54" height="30" rx="4" fill="#D87A55" stroke="#F0997B" stroke-width="1.5"/>
