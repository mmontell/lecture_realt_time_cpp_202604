<rect x="80"  y="236" width="54" height="30" rx="4" fill="url(#hatch)"/>
<text x="107"  y="255" text-anchor="middle" font-family="monospace" font-size="10" fill="#0B0D12">eta₄</text>
<rect x="138" y="236" width="54" height="30" rx="4" fill="#E8B44A" stroke="#FAC775" stroke-width="0.5"/>
<rect x="138" y="236" width="54" height="30" rx="4" fill="url(#hatch)"/>
